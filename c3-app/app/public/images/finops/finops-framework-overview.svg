<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937">
    FinOps Framework Overview
  </text>
  
  <!-- Central Circle - FinOps Practice -->
  <circle cx="400" cy="300" r="80" fill="url(#grad1)" stroke="#065f46" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    FinOps
  </text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    Practice
  </text>
  
  <!-- Phases Circle -->
  <g>
    <!-- Inform -->
    <circle cx="200" cy="180" r="60" fill="url(#grad2)" stroke="#1e40af" stroke-width="2"/>
    <text x="200" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      INFORM
    </text>
    <text x="200" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
      Visibility &amp; Analytics
    </text>
    
    <!-- Optimize -->
    <circle cx="600" cy="180" r="60" fill="url(#grad3)" stroke="#d97706" stroke-width="2"/>
    <text x="600" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      OPTIMIZE
    </text>
    <text x="600" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
      Cost Efficiency
    </text>
    
    <!-- Operate -->
    <circle cx="400" cy="480" r="60" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">
      OPERATE
    </text>
    <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">
      Governance &amp; Control
    </text>
  </g>
  
  <!-- Connecting Lines -->
  <line x1="260" y1="200" x2="340" y2="280" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="200" x2="460" y2="280" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="380" x2="400" y2="420" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
     refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  
  <!-- Personas -->
  <g>
    <rect x="50" y="320" width="100" height="60" rx="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
    <text x="100" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#374151">
      PERSONAS
    </text>
    <text x="100" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">
      Engineering
    </text>
    <text x="100" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">
      Finance • Product
    </text>
  </g>
  
  <!-- Principles -->
  <g>
    <rect x="650" y="320" width="100" height="60" rx="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
    <text x="700" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#374151">
      PRINCIPLES
    </text>
    <text x="700" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">
      Collaboration
    </text>
    <text x="700" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">
      Ownership • Value
    </text>
  </g>
  
  <!-- Maturity Model -->
  <g>
    <rect x="350" y="80" width="100" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#92400e">
      MATURITY MODEL
    </text>
    <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">
      Crawl → Walk → Run
    </text>
  </g>
  
  <!-- Capabilities/Domains -->
  <g>
    <ellipse cx="120" cy="450" rx="80" ry="30" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="1"/>
    <text x="120" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#5b21b6">
      CAPABILITIES
    </text>
    <text x="120" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7c3aed">
      Functional Activities
    </text>
  </g>
  
  <g>
    <ellipse cx="680" cy="450" rx="80" ry="30" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="1"/>
    <text x="680" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#5b21b6">
      DOMAINS
    </text>
    <text x="680" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7c3aed">
      Outcome Areas
    </text>
  </g>
</svg>
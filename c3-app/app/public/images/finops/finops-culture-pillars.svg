<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cultureGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cultureGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cultureGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937">
    FinOps Culture Transformation
  </text>
  
  <!-- Central Culture Hub -->
  <circle cx="400" cy="300" r="90" fill="url(#cultureGrad1)" stroke="#047857" stroke-width="3"/>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    FinOps
  </text>
  <text x="400" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">
    Culture
  </text>
  <text x="400" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">
    Shared Ownership
  </text>
  
  <!-- Cultural Elements -->
  <g>
    <!-- Shared Ownership -->
    <rect x="50" y="100" width="180" height="80" rx="15" fill="url(#cultureGrad2)" stroke="#1d4ed8" stroke-width="2"/>
    <text x="140" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      Shared Ownership
    </text>
    <text x="60" y="145" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Cost-conscious engineering
    </text>
    <text x="60" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Team accountability
    </text>
    <text x="60" y="175" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Efficient resource usage
    </text>
    
    <!-- Transparent Communication -->
    <rect x="570" y="100" width="180" height="80" rx="15" fill="url(#cultureGrad3)" stroke="#7c3aed" stroke-width="2"/>
    <text x="660" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      Transparent Communication
    </text>
    <text x="580" y="145" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Regular cost sharing
    </text>
    <text x="580" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Trade-off discussions
    </text>
    <text x="580" y="175" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Feedback loops
    </text>
    
    <!-- Continuous Learning -->
    <rect x="50" y="450" width="180" height="80" rx="15" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="140" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      Continuous Learning
    </text>
    <text x="60" y="495" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Regular retrospectives
    </text>
    <text x="60" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Best practice sharing
    </text>
    <text x="60" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Skill development
    </text>
    
    <!-- Business Alignment -->
    <rect x="570" y="450" width="180" height="80" rx="15" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="660" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
      Business Alignment
    </text>
    <text x="580" y="495" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Cost-outcome correlation
    </text>
    <text x="580" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Business impact priority
    </text>
    <text x="580" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="white">
      • Product integration
    </text>
  </g>
  
  <!-- Connecting lines to center -->
  <defs>
    <marker id="cultureArrow" markerWidth="8" markerHeight="6" 
     refX="0" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>
  
  <line x1="230" y1="160" x2="320" y2="240" stroke="#6b7280" stroke-width="2" marker-end="url(#cultureArrow)"/>
  <line x1="570" y1="160" x2="480" y2="240" stroke="#6b7280" stroke-width="2" marker-end="url(#cultureArrow)"/>
  <line x1="230" y1="470" x2="320" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#cultureArrow)"/>
  <line x1="570" y1="470" x2="480" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#cultureArrow)"/>
  
  <!-- Transformation Stages -->
  <rect x="280" y="80" width="240" height="40" rx="20" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">
    Cultural Transformation Journey
  </text>
  
  <!-- Success Factors -->
  <rect x="280" y="520" width="240" height="60" rx="15" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">
    Success Factors
  </text>
  <text x="400" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">
    Leadership Commitment • Education • Incentive Alignment
  </text>
  <text x="400" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">
    Continuous Reinforcement • Automation Tools
  </text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiFinopsGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiFinopsGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f1f5f9"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    AI-Enhanced FinOps Automation
  </text>
  
  <!-- Central AI Engine -->
  <ellipse cx="400" cy="300" rx="120" ry="80" fill="url(#aiFinopsGrad1)" stroke="#4338ca" stroke-width="3"/>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
    AI Engine
  </text>
  <text x="400" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">
    Machine Learning
  </text>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">
    Predictive Analytics
  </text>
  
  <!-- AI Applications -->
  <g>
    <!-- Anomaly Detection -->
    <circle cx="150" cy="150" r="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d97706">
      ANOMALY
    </text>
    <text x="150" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d97706">
      DETECTION
    </text>
    <text x="150" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">
      Cost patterns
    </text>
    
    <!-- Forecasting -->
    <circle cx="650" cy="150" r="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="650" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8">
      PREDICTIVE
    </text>
    <text x="650" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8">
      FORECASTING
    </text>
    <text x="650" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">
      Budget planning
    </text>
    
    <!-- Optimization -->
    <circle cx="150" cy="450" r="50" fill="url(#aiFinopsGrad2)" stroke="#059669" stroke-width="2"/>
    <text x="150" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      INTELLIGENT
    </text>
    <text x="150" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      OPTIMIZATION
    </text>
    <text x="150" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      Auto-recommendations
    </text>
    
    <!-- Automation -->
    <circle cx="650" cy="450" r="50" fill="#e879f9" stroke="#d946ef" stroke-width="2"/>
    <text x="650" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      AUTOMATED
    </text>
    <text x="650" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      DECISIONS
    </text>
    <text x="650" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">
      Policy-based actions
    </text>
  </g>
  
  <!-- Connecting arrows -->
  <defs>
    <marker id="aiArrowHead" markerWidth="10" markerHeight="7" 
     refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <line x1="200" y1="170" x2="290" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#aiArrowHead)"/>
  <line x1="600" y1="170" x2="510" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#aiArrowHead)"/>
  <line x1="200" y1="430" x2="290" y2="350" stroke="#64748b" stroke-width="2" marker-end="url(#aiArrowHead)"/>
  <line x1="600" y1="430" x2="510" y2="350" stroke="#64748b" stroke-width="2" marker-end="url(#aiArrowHead)"/>
  
  <!-- Human-AI Collaboration -->
  <rect x="300" y="80" width="200" height="60" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">
    Human-AI Collaboration
  </text>
  <text x="400" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">
    Augmentation • Validation • Feedback
  </text>
  
  <!-- Outcomes -->
  <g>
    <rect x="250" y="520" width="300" height="60" rx="15" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">
      AI-Enhanced Outcomes
    </text>
    <text x="400" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#15803d">
      Faster Decisions • Proactive Management • Scalable Impact
    </text>
  </g>
  
  <!-- Data Flow -->
  <g>
    <rect x="50" y="280" width="120" height="40" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
    <text x="110" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4338ca">
      Data Ingestion
    </text>
    <text x="110" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4f46e5">
      Cost • Usage • Business
    </text>
    
    <rect x="630" y="280" width="120" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="690" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d97706">
      Action Execution
    </text>
    <text x="690" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">
      Optimization • Alerts
    </text>
    
    <!-- Flow arrows -->
    <line x1="170" y1="300" x2="280" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#aiArrowHead)"/>
    <line x1="520" y1="300" x2="630" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#aiArrowHead)"/>
  </g>
</svg>
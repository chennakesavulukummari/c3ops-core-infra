<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="whyGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whyGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f1f5f9"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Why Organizations Need FinOps
  </text>
  
  <!-- Traditional IT vs Cloud -->
  <g>
    <!-- Traditional IT Box -->
    <rect x="50" y="70" width="300" height="120" rx="15" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="200" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">
      Traditional IT Challenges
    </text>
    <text x="60" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      • Fixed costs, slow provisioning
    </text>
    <text x="60" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      • Centralized decision making
    </text>
    <text x="60" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      • Annual budget cycles
    </text>
    <text x="60" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">
      • Limited visibility &amp; control
    </text>
    
    <!-- Cloud Box -->
    <rect x="450" y="70" width="300" height="120" rx="15" fill="url(#whyGrad1)" stroke="#059669" stroke-width="2"/>
    <text x="600" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">
      Cloud Opportunities &amp; Challenges
    </text>
    <text x="460" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="white">
      • Variable costs, instant provisioning
    </text>
    <text x="460" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="white">
      • Decentralized decisions by engineers
    </text>
    <text x="460" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="white">
      • Real-time spending, cost surprises
    </text>
    <text x="460" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="white">
      • Speed vs. cost trade-offs
    </text>
  </g>
  
  <!-- Arrow pointing down -->
  <defs>
    <marker id="downArrow" markerWidth="10" markerHeight="10" 
     refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#6b7280"/>
    </marker>
  </defs>
  <line x1="400" y1="210" x2="400" y2="250" stroke="#6b7280" stroke-width="3" marker-end="url(#downArrow)"/>
  
  <!-- FinOps Solution -->
  <rect x="150" y="270" width="500" height="180" rx="20" fill="url(#whyGrad2)" stroke="#1d4ed8" stroke-width="3"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">
    FinOps Solution
  </text>
  
  <!-- Benefits in columns -->
  <g>
    <!-- Column 1 -->
    <circle cx="200" cy="340" r="25" fill="white" fill-opacity="0.9"/>
    <text x="200" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8">
      FINANCIAL
    </text>
    <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8">
      CONTROL
    </text>
    <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
      Real-time visibility
    </text>
    <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
      Cost prediction
    </text>
    
    <!-- Column 2 -->
    <circle cx="400" cy="340" r="25" fill="white" fill-opacity="0.9"/>
    <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8">
      INFORMED
    </text>
    <text x="400" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8">
      DECISIONS
    </text>
    <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
      Cost-aware engineering
    </text>
    <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
      Data-driven choices
    </text>
    
    <!-- Column 3 -->
    <circle cx="600" cy="340" r="25" fill="white" fill-opacity="0.9"/>
    <text x="600" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8">
      BUSINESS
    </text>
    <text x="600" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8">
      VALUE
    </text>
    <text x="600" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
      Maximize ROI
    </text>
    <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
      Competitive advantage
    </text>
  </g>
  
  <!-- Bottom outcome -->
  <rect x="250" y="420" width="300" height="25" rx="12" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">
    Harness Cloud Benefits + Financial Discipline
  </text>
</svg>
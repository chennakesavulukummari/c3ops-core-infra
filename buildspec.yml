version: 0.2

# AWS CodeBuild Configuration for C3OPS Core Infrastructure

phases:
  install:
    commands:
      - echo "Installing Terraform..."
      - wget -q https://releases.hashicorp.com/terraform/1.9.5/terraform_1.9.5_linux_amd64.zip
      - unzip terraform_1.9.5_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version
      - echo "Installing AWS CLI v2..."
      - pip install --upgrade awscli
      - aws --version

  pre_build:
    commands:
      - echo "Pre-build phase started at $(date)"
      - echo "Logging into AWS ECR (if needed)..."
      - aws sts get-caller-identity
      - echo "Navigating to Terraform directory..."
      - cd iac/preprod
      - echo "Initializing Terraform..."
      - terraform init
      - echo "Validating Terraform configuration..."
      - terraform validate
      # - echo "Formatting check..."
      # - terraform fmt -check -recursive ../

  build:
    commands:
      - echo "Build phase started at $(date)"
      - echo "Planning infrastructure deployment..."
      - terraform plan -lock=false
      - echo "Infrastructure plan saved to tfplan"

  post_build:
    commands:
      - echo "Post-build phase started at $(date)"
      #- terraform apply --auto-approve -lock=false
      - terraform destroy --auto-approve -lock=false
      - echo "Build completed at $(date)"

# Artifacts to save from the build
artifacts:
  files:
    - iac/preprod/tfplan
    - iac/preprod/tfplan.json
    - iac/preprod/.terraform.lock.hcl
  name: TerraformArtifacts
